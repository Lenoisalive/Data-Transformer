version: '3.8'

services:
  # PostgreSQL - 系统数据库
  postgres:
    image: postgres:15-alpine
    container_name: dt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_transformer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    networks:
      - dt-network

  # Redis - 缓存和任务队列
  redis:
    image: redis:7-alpine
    container_name: dt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker/data/redis:/data
    networks:
      - dt-network

  # MinIO - 文件存储
  minio:
    image: minio/minio:latest
    container_name: dt-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/data/minio:/data
    networks:
      - dt-network

  # MySQL 测试数据源（可选）
  mysql-test:
    image: mysql:8.0
    container_name: dt-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: test_hospital
    ports:
      - "3306:3306"
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    networks:
      - dt-network

networks:
  dt-network:
    driver: bridge
